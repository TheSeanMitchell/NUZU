<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUZU News — Offline</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%230D1B4B'/><text x='32' y='46' font-family='Arial,sans-serif' font-size='24' font-weight='900' fill='%23FFFFFF' text-anchor='middle'>NZ</text></svg>">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#070F2B;--dark:#0D1B4B;--blue:#1E4FD8;
    --text:#CDD5E0;--muted:#5577AA;--white:#fff;
  }
  body{
    background:var(--dark);color:var(--text);
    font-family:Arial,sans-serif;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px;text-align:center;
  }
  .logo{
    font-size:3rem;font-weight:900;letter-spacing:0.12em;
    color:var(--white);margin-bottom:8px;
  }
  .tagline{color:var(--muted);font-size:0.82em;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:40px;}
  .icon{font-size:3.5rem;margin-bottom:20px;opacity:0.6;}
  h1{font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:10px;}
  p{color:var(--muted);font-size:0.9em;line-height:1.7;max-width:360px;margin:0 auto 28px;}
  .btn{
    display:inline-block;background:var(--blue);color:var(--white);
    text-decoration:none;padding:12px 28px;border-radius:6px;
    font-size:0.9em;font-weight:bold;cursor:pointer;border:none;
    letter-spacing:0.04em;transition:opacity 0.15s;
  }
  .btn:hover{opacity:0.85;}
  .saved-section{margin-top:36px;width:100%;max-width:480px;}
  .saved-title{font-size:0.72em;font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .saved-list{text-align:left;}
  .saved-item{
    background:#0A1535;border:1px solid #1A2A4A;border-radius:4px;
    padding:10px 14px;margin-bottom:8px;cursor:pointer;
    font-size:0.85em;color:var(--text);transition:border-color 0.15s;
  }
  .saved-item:hover{border-color:var(--blue);}
  .no-saved{color:var(--muted);font-size:0.82em;}
  .pulse{animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
</style>
</head>
<body>
<div class="logo">NUZU</div>
<div class="tagline">Real News in Real Time</div>
<div class="icon pulse">&#128246;</div>
<h1>You're offline</h1>
<p>No internet connection detected. Check your connection and try again, or browse your saved articles below.</p>
<button class="btn" onclick="window.location.reload()">&#8635; Try Again</button>

<div class="saved-section">
  <p class="saved-title">&#9733; Your saved articles</p>
  <div class="saved-list" id="saved-list">
    <p class="no-saved">No saved articles yet.</p>
  </div>
</div>

<script>
(function(){
  try{
    var raw=localStorage.getItem('nuzu_saved_articles');
    if(!raw)return;
    var saved=JSON.parse(raw);
    var keys=Object.keys(saved);
    if(!keys.length)return;
    var list=document.getElementById('saved-list');
    list.innerHTML='';
    keys.forEach(function(url){
      var d=document.createElement('div');
      d.className='saved-item';
      d.textContent=saved[url]||url;
      d.onclick=function(){window.open(url,'_blank');};
      list.appendChild(d);
    });
  }catch(e){}
})();
</script>
</body>
</html>

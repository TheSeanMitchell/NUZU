name: refresh

on:
  schedule:
    - cron: '17 * * * *'   # every hour at :17 (avoids GitHub queue congestion at :00)
  workflow_dispatch:        # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Run bot
        id: run_bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python bot.py
          echo "BOT_SUCCESS=true" >> $GITHUB_OUTPUT

      - name: Verify output files exist
        run: |
          test -f index.html || (echo "ERROR: index.html not generated" && exit 1)
          test -f feed.json  || (echo "ERROR: feed.json not generated"  && exit 1)
          test -f feed.xml   || (echo "ERROR: feed.xml not generated"   && exit 1)
          echo "All output files verified."

      - name: Bump version.json timestamp
        run: |
          python3 -c "
          import json, datetime
          try:
              with open('version.json','r') as f:
                  v = json.load(f)
          except:
              v = {'version':'1.0.0'}
          v['build'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('version.json','w') as f:
              json.dump(v, f, indent=2)
          print('version.json updated:', v)
          "

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html feed.xml feed.json _headers version.json
          git diff --cached --quiet || git commit -m "Auto-refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Bot run failed. index.html was NOT updated. Previous version remains live."
